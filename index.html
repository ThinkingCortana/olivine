<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olivine</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://unpkg.com/kuromoji"></script>
<style>
:root{
--bg:#111113;--surface:#1c1c1e;--text:#f5f5f7;--text-light:#a1a1a6;
--c:#7aa844;--c-hover:#6b9438;--c-soft:rgba(122,168,68,.12);--c-glow:rgba(122,168,68,.2);
--border:#3a3a3c;--border-light:#2c2c2e;
--shadow-sm:0 1px 3px rgba(0,0,0,.2);--shadow-md:0 4px 16px rgba(0,0,0,.3);--shadow-lg:0 8px 32px rgba(0,0,0,.35);
--pill-bg:rgba(44,44,46,.85);--pill-bg-focus:rgba(44,44,46,.9);
--pill-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 2px 12px rgba(0,0,0,.2);
--pill-shadow-focus:inset 0 1px 0 rgba(255,255,255,.06),0 2px 20px rgba(0,0,0,.3);
--nav-url-bg:rgba(255,255,255,.07);--nav-url-focus-bg:rgba(255,255,255,.1);
--hover-bg:rgba(255,255,255,.06);--hover-text:var(--text);
--toast-bg:rgba(28,28,30,.95);--toast-border:var(--c);
--copilot-bg:rgba(20,20,22,.75);
--epm-active-bg:rgba(58,90,28,.25);
--suggest-chip-bg:rgba(122,168,68,.2);--suggest-chip-border:rgba(122,168,68,.35);--suggest-chip-text:#c5dda8;
--suggest-chip-hover-bg:rgba(122,168,68,.4);
--vtab-active-bar-w:4px;
--grad-colors:#7aa844 0%,#3a5a1c 15%,#c4a83a 30%,#a86e3a 45%,#7aa844 60%,#5a8a3c 80%,#7aa844 100%;
--particle-hue-base:80;
--toggle-bg:rgba(255,255,255,.15);--toggle-active-c:var(--c);
--nav-h:50px;--vtab-w:52px;
}
body.vtab-pinned{--vtab-w:244px}
body.clarvet-on{
--grad-colors:#84cc16 0%,#10b981 25%,#2563eb 50%,#84cc16 75%,#10b981 100%;
--particle-hue-base:140;--toggle-active-c:#10b981
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);height:100vh;display:flex;flex-direction:column;color:var(--text);overflow:hidden}

.vtab-bar{position:fixed;top:0;left:0;width:var(--vtab-w);height:100%;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:200;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden}
.vtab-head{height:var(--nav-h);display:flex;align-items:center;padding:0 14px;gap:8px;border-bottom:1px solid var(--border);flex-shrink:0}
.vtab-logo{font-weight:800;font-size:15px;color:var(--c);cursor:pointer;user-select:none;white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0}
body:not(.vtab-pinned) .vtab-logo span{opacity:0;width:0;overflow:hidden}
.vtab-logo i{font-size:12px;opacity:.7;flex-shrink:0}
.vtab-list{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;display:flex;flex-direction:column;gap:1px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.vtab-list::-webkit-scrollbar{width:4px}
.vtab-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.vtab-item{height:38px;display:flex;align-items:center;padding:0 10px;gap:10px;border-radius:8px;cursor:pointer;user-select:none;transition:background .1s;position:relative;overflow:hidden;flex-shrink:0;white-space:nowrap}
.vtab-item:hover{background:var(--hover-bg)}
.vtab-item.active{background:var(--epm-active-bg)}
.vtab-item.active::before{content:'';position:absolute;left:0;top:6px;bottom:6px;width:var(--vtab-active-bar-w);background:var(--c);border-radius:0 4px 4px 0}
.vtab-favicon{width:16px;height:16px;border-radius:3px;display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden}
.vtab-favicon img{width:16px;height:16px;border-radius:3px}
.vtab-favicon i{font-size:11px;color:var(--text-light)}
.vtab-title-text{font-size:12px;color:var(--text-light);overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;line-height:1;transition:opacity .15s,max-width .25s cubic-bezier(.4,0,.2,1);max-width:200px}
body:not(.vtab-pinned) .vtab-title-text{opacity:0;max-width:0}
.vtab-item.active .vtab-title-text{color:var(--text);font-weight:500}
.vtab-close-btn{width:20px;height:20px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;opacity:0;transition:all .1s;flex-shrink:0;background:0 0;border:none;cursor:pointer;color:var(--text-light)}
.vtab-item:hover .vtab-close-btn{opacity:.5}
.vtab-close-btn:hover{opacity:1!important;background:var(--border);color:var(--text)}
body:not(.vtab-pinned) .vtab-close-btn{display:none!important}
.vtab-rename-input{font-size:12px;font-family:inherit;background:rgba(255,255,255,.1);border:1px solid var(--c);border-radius:4px;color:var(--text);padding:1px 6px;outline:none;width:100%;height:22px}
.vtab-foot{border-top:1px solid var(--border);padding:6px;flex-shrink:0;display:flex;flex-direction:column;gap:2px}
.vtab-foot-btn{height:34px;display:flex;align-items:center;gap:10px;padding:0 12px;border-radius:8px;border:none;background:0 0;cursor:pointer;color:var(--text-light);font-size:12px;font-family:inherit;transition:all .1s;white-space:nowrap;overflow:hidden}
.vtab-foot-btn:hover{background:var(--hover-bg);color:var(--hover-text)}
.vtab-foot-btn i{flex-shrink:0;width:16px;text-align:center;font-size:12px}
.vtab-foot-btn span{transition:opacity .15s,max-width .25s cubic-bezier(.4,0,.2,1);max-width:120px;overflow:hidden}
body:not(.vtab-pinned) .vtab-foot-btn span{opacity:0;max-width:0}
.vtab-foot-btn.pinned-active{color:var(--c)}

.navbar{position:fixed;top:0;left:var(--vtab-w);right:0;height:var(--nav-h);background:0 0;display:flex;align-items:center;padding:0 20px;flex-shrink:0;z-index:100;transition:left .25s cubic-bezier(.4,0,.2,1),box-shadow .3s;border-bottom:1px solid transparent;gap:10px}
.navbar.search-focused{box-shadow:var(--shadow-md);background:var(--surface);border-bottom-color:var(--border-light)}
.navbar-left{flex-shrink:0;z-index:2}
.quick-search-box{position:relative;width:170px;height:32px;border-radius:999px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;padding:0 10px;transition:all .25s cubic-bezier(.4,0,.2,1);box-shadow:var(--shadow-sm)}
.quick-search-box:focus-within{width:240px;border-color:var(--c);box-shadow:var(--shadow-md),0 0 0 3px var(--c-glow)}
.quick-search-box i{font-size:11px;color:var(--text-light);flex-shrink:0;pointer-events:none}
#quickSearchInput{flex:1;border:none;background:0 0;font-size:12px;font-family:inherit;outline:none;color:var(--text);height:100%;padding:0 6px}
#quickSearchInput::placeholder{color:transparent}
#quickSearchInput:not(:focus):not(:placeholder-shown)~.qs-ghost{opacity:0}
.qs-ghost{position:absolute;left:28px;font-size:12px;color:var(--text-light);font-weight:300;pointer-events:none;white-space:nowrap;display:flex;align-items:center;gap:0;transition:opacity .2s}
.qs-ghost .qs-cursor{display:inline-block;width:1.5px;height:14px;background:var(--c);margin-left:1px;animation:qsBlink 1s infinite;vertical-align:middle;border-radius:1px}
@keyframes qsBlink{0%,100%{opacity:1}50%{opacity:0}}
.nav-center{flex:1;display:flex;justify-content:center;z-index:1;min-width:0}
.nav-pill-wrapper{position:relative;width:auto;border-radius:999px;padding:1.5px;transition:width .4s cubic-bezier(.4,0,.2,1),max-width .4s cubic-bezier(.4,0,.2,1)}
.nav-pill-wrapper:has(.nav-pill:hover),.nav-pill-wrapper:has(.nav-pill:focus-within),.nav-pill-wrapper.pinned{width:100%;max-width:640px}
.nav-pill-wrapper::before{content:'';position:absolute;inset:0;border-radius:999px;padding:1.5px;background:conic-gradient(from var(--nav-grad-angle,0deg),var(--grad-colors));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:-1}
.nav-pill{display:flex;align-items:center;height:34px;padding:0 8px;gap:3px;background:var(--pill-bg);backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);border-radius:999px;box-shadow:var(--pill-shadow);position:relative;z-index:1;transition:background .3s,box-shadow .3s}
.navbar.search-focused .nav-pill{background:var(--pill-bg-focus);box-shadow:var(--pill-shadow-focus)}
.nav-btn{width:26px;height:26px;border-radius:50%;border:none;background:0 0;cursor:pointer;color:var(--text-light);font-size:11px;display:flex;align-items:center;justify-content:center;transition:all .12s;flex-shrink:0}
.nav-btn:hover{background:var(--hover-bg);color:var(--hover-text)}
.nav-url-row{max-width:0;opacity:0;overflow:hidden;flex:1;min-width:0;transition:max-width .4s cubic-bezier(.4,0,.2,1),opacity .3s ease .05s;position:relative}
.nav-pill:hover .nav-url-row,.nav-pill:focus-within .nav-url-row,.nav-pill-wrapper.pinned .nav-url-row{max-width:480px;opacity:1}
.nav-url{width:100%;height:26px;border-radius:999px;background:var(--nav-url-bg);border:1.5px solid transparent;padding:0 28px 0 14px;font-size:13px;font-family:inherit;outline:none;color:var(--text);transition:all .2s}
.nav-url:focus{background:var(--nav-url-focus-bg);border-color:var(--c);box-shadow:0 0 0 3px var(--c-glow)}
.nav-url::placeholder{color:var(--text-light);font-weight:300;opacity:.6}
.nav-url-clear{position:absolute;right:4px;top:50%;transform:translateY(-50%);width:20px;height:20px;border-radius:50%;border:none;background:var(--border);color:var(--text-light);cursor:pointer;font-size:10px;display:none;align-items:center;justify-content:center;transition:all .12s;z-index:2}
.nav-url-clear.visible{display:flex}
.nav-url-clear:hover{background:var(--border);color:var(--text)}
.nav-tools{max-width:0;opacity:0;overflow:hidden;flex-shrink:0;display:flex;gap:1px;align-items:center;transition:max-width .4s cubic-bezier(.4,0,.2,1),opacity .3s ease .1s}
.nav-pill:hover .nav-tools,.nav-pill:focus-within .nav-tools,.nav-pill-wrapper.pinned .nav-tools{max-width:240px;opacity:1}
.tool-btn{height:26px;padding:0 7px;border-radius:999px;border:none;background:0 0;font-size:11px;font-weight:600;cursor:pointer;color:var(--text-light);transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:4px;font-family:inherit;flex-shrink:0}
.tool-btn:hover{background:var(--hover-bg);color:var(--hover-text)}
.tool-btn.text-btn{background:var(--c);color:#fff}
.tool-btn.text-btn:hover{background:var(--c-hover)}
.navbar-right{flex-shrink:0;z-index:2;display:flex;align-items:center;gap:10px}

.clarvet-toggle-wrap{display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
.clarvet-toggle-label{font-size:11px;font-weight:700;color:var(--text-light);letter-spacing:.3px;transition:color .3s}
.clarvet-toggle-label.active{color:var(--toggle-active-c)}
.clarvet-toggle{position:relative;width:36px;height:20px;background:var(--toggle-bg);border-radius:999px;transition:background .35s cubic-bezier(.4,0,.2,1);flex-shrink:0}
.clarvet-toggle::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .35s cubic-bezier(.4,0,.2,1),box-shadow .35s}
body.clarvet-on .clarvet-toggle{background:var(--toggle-active-c)}
body.clarvet-on .clarvet-toggle::after{transform:translateX(16px);box-shadow:0 1px 8px rgba(16,185,129,.4)}

.epm-pill-wrap{cursor:pointer;user-select:none}
.epm-pill-border{position:relative;padding:2px;border-radius:999px}
.epm-pill-border::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:2px;background:conic-gradient(from var(--epm-grad-angle,0deg),var(--grad-colors));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;animation:epmGradSpin 3s linear infinite}
@property --epm-grad-angle{syntax:'<angle>';initial-value: 0deg;inherits:false}
@keyframes epmGradSpin{to{--epm-grad-angle:360deg}}
.epm-pill-inner{background:var(--surface);color:var(--c);padding:0 18px;height:32px;border-radius:999px;font-weight:800;font-size:12px;letter-spacing:-.3px;display:flex;align-items:center;white-space:nowrap;position:relative;z-index:1;border:1px solid rgba(255,255,255,.1);transition:all .2s;box-shadow:var(--shadow-sm)}
.epm-pill-wrap:hover .epm-pill-inner{background:var(--c);color:#fff;border-color:var(--c)}

.main-area{flex:1;position:relative;background:var(--surface);overflow:hidden;margin-top:var(--nav-h);margin-left:var(--vtab-w);transition:margin-left .25s cubic-bezier(.4,0,.2,1),margin-top .35s cubic-bezier(.4,0,.2,1),opacity .25s,visibility .25s}
.main-area.search-hidden{margin-top:0;opacity:0;visibility:hidden;pointer-events:none}
iframe{width:100%;height:100%;border:none;display:none}
iframe.active{display:block}
#searchFxCanvas{position:absolute;inset:0;z-index:50;pointer-events:none;width:100%;height:100%}

.home{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;overflow:hidden}
.home.hidden{display:none}
.home-bg{position:absolute;inset:0;background-size:cover;background-position:center;transition:opacity 1.2s ease}
.home-bg-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.2),rgba(0,0,0,.6))}
.home-t{font-size:48px;font-weight:800;letter-spacing:-2px;color:#fff;opacity:0;margin-bottom:8px;position:relative;z-index:2;text-shadow:0 2px 12px rgba(0,0,0,.4)}
.home-t.animating{animation:olivineReveal .85s cubic-bezier(.16,1,.3,1) forwards}
@keyframes olivineReveal{0%{opacity:0;transform:scale(.82) translateY(24px);filter:blur(12px)}50%{opacity:.8;filter:blur(0)}100%{opacity:.9;transform:scale(1) translateY(0);filter:blur(0)}}
.home-sub{color:rgba(255,255,255,.7);font-size:13px;font-weight:300;margin-bottom:36px;letter-spacing:2.5px;text-transform:uppercase;opacity:0;position:relative;z-index:2}
.home-sub.animating{animation:subReveal .6s cubic-bezier(.16,1,.3,1) .18s forwards}
@keyframes subReveal{from{opacity:0;transform:translateY(12px);letter-spacing:6px}to{opacity:1;transform:translateY(0);letter-spacing:2.5px}}
.home-in{width:min(520px,85%);height:50px;border-radius:25px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.15);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:0 24px;font-size:15px;font-family:inherit;box-shadow:0 4px 24px rgba(0,0,0,.2);outline:none;transition:all .2s;color:#fff;opacity:0;position:relative;z-index:2}
.home-in.animating{animation:inputReveal .6s cubic-bezier(.16,1,.3,1) .32s forwards}
@keyframes inputReveal{from{opacity:0;transform:translateY(14px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}
}
.home-in::placeholder{color:rgba(255,255,255,.6);font-weight:300}
.home-in:focus{box-shadow:0 0 0 2px rgba(255,255,255,.5);background:rgba(255,255,255,.25)}
.home-app-chips{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:12px;position:relative;z-index:2;max-width:min(520px,85%)}
.home-app-chip{padding:5px 16px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:999px;font-size:12px;color:rgba(255,255,255,.8);cursor:pointer;transition:all .15s;user-select:none;backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);white-space:nowrap}
.home-app-chip:hover{background:rgba(255,255,255,.25);color:#fff;border-color:rgba(255,255,255,.4);transform:translateY(-1px)}
.home-settings{position:absolute;bottom:20px;right:20px;z-index:20;display:flex;gap:8px;opacity:0;transition:opacity .3s}
.home:hover .home-settings{opacity:1}
.home-set-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.4);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.home-set-btn:hover{background:rgba(0,0,0,.6);transform:scale(1.1)}

.home-suggest{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);z-index:15;width:min(580px,90%);opacity:0;transition:opacity .5s ease;pointer-events:none}
.home-suggest.visible{opacity:1;pointer-events:auto}
.home-suggest-box{background:rgba(0,0,0,.55);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(255,255,255,.1);border-radius:14px;padding:16px 18px;position:relative}
.home-suggest-text{font-size:13px;color:rgba(255,255,255,.75);margin-bottom:10px;line-height:1.5}
.home-suggest-text strong{color:#fff;font-weight:600}
.home-suggest-chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.home-suggest-chip{padding:5px 14px;background:var(--suggest-chip-bg);border:1px solid var(--suggest-chip-border);border-radius:999px;font-size:12px;color:var(--suggest-chip-text);cursor:pointer;transition:all .15s;user-select:none}
.home-suggest-chip:hover{background:var(--suggest-chip-hover-bg);color:#fff;border-color:var(--c);transform:translateY(-1px)}
.home-clean-btn{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:6px;border:none;background:rgba(255,255,255,.08);color:rgba(255,255,255,.4);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;transition:all .15s;font-family:inherit;font-weight:700}
.home-clean-btn:hover{background:rgba(255,255,255,.15);color:rgba(255,255,255,.7)}

.clarvet-activation{position:absolute;inset:0;z-index:90;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;visibility:hidden;pointer-events:none;transition:opacity .6s cubic-bezier(.16,1,.3,1),visibility .6s}
.clarvet-activation.visible{opacity:1;visibility:visible;pointer-events:auto}
.clarvet-activation-bg{position:absolute;inset:0;background:linear-gradient(135deg,#84cc16 0%,#10b981 35%,#2563eb 70%,#0ea5e9 100%);transition:opacity .5s}
.clarvet-activation-bg.fade-out{opacity:0}
.clarvet-activation-text{position:relative;z-index:2;font-size:42px;font-weight:800;color:#fff;text-shadow:0 2px 20px rgba(0,0,0,.3);letter-spacing:-1px;min-height:52px;text-align:center}
.clarvet-cursor{display:inline-block;width:2px;height:38px;background:#fff;margin-left:2px;vertical-align:middle;border-radius:1px;animation:clarvetCursorBlink .8s infinite}
@keyframes clarvetCursorBlink{0%,100%{opacity:1}50%{opacity:0}}
.clarvet-mode-label{position:relative;z-index:2;font-size:16px;font-weight:500;color:rgba(255,255,255,.85);letter-spacing:3px;text-transform:uppercase;margin-top:16px;opacity:0;transform:translateY(8px);transition:opacity .5s cubic-bezier(.16,1,.3,1),transform .5s cubic-bezier(.16,1,.3,1)}
.clarvet-mode-label.show{opacity:1;transform:translateY(0)}

.overlay-panel{position:fixed;background:var(--surface);box-shadow:-5px 0 24px rgba(0,0,0,.3);z-index:9999;display:flex;flex-direction:column}
.ext-panel{top:0;right:-360px;width:360px;height:100%;transition:right .25s;border-left:1px solid var(--border-light)}
.ext-panel.open{right:0}
.ext-head{padding:14px 18px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;background:var(--bg)}
.ext-close{background:0 0;border:none;font-size:18px;cursor:pointer;color:var(--text-light);width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center}
.ext-close:hover{background:var(--border-light);color:var(--text)}
.ext-tabs{display:flex;border-bottom:1px solid var(--border);background:var(--surface)}
.ext-tab-btn{flex:1;padding:9px 4px;text-align:center;font-size:11px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-light);transition:all .15s;background:0 0;border-top:none;border-left:none;border-right:none;min-width:56px;font-family:inherit;font-weight:500}
.ext-tab-btn:hover{color:var(--text)}
.ext-tab-btn.active{border-bottom-color:var(--c);color:var(--c);font-weight:700}
.ext-content{flex:1;overflow-y:auto;padding:14px;display:none;background:var(--surface)}
.ext-content.active{display:block}
.ext-content::-webkit-scrollbar{width:4px}
.ext-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.memo-textarea{width:100%;height:200px;border:1px solid var(--border);border-radius:6px;padding:10px;font-family:inherit;font-size:13px;resize:vertical;outline:none;background:var(--bg);color:var(--text);line-height:1.5}
.memo-textarea:focus{border-color:var(--c)}
.list-item{padding:9px 10px;border-bottom:1px solid var(--border-light);cursor:pointer;font-size:12px;position:relative;transition:background .1s;border-radius:4px}
.list-item:hover{background:var(--bg)}
.list-title{font-weight:600;color:var(--text);margin-bottom:1px;padding-right:20px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.list-url{color:var(--text-light);font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:20px}
.list-time{font-size:9px;color:var(--text-light);margin-top:2px;opacity:.6}
.list-delete{position:absolute;right:6px;top:50%;transform:translateY(-50%);background:0 0;border:none;color:var(--text-light);cursor:pointer;font-size:13px;width:18px;height:18px;border-radius:4px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .1s}
.list-item:hover .list-delete{opacity:1}
.list-delete:hover{color:var(--text);background:var(--border)}
.clear-btn{width:100%;margin-top:10px;padding:7px;background:var(--surface);border:1px solid var(--border);color:var(--text-light);border-radius:4px;cursor:pointer;font-size:11px;font-family:inherit;transition:all .15s}
.clear-btn:hover{background:var(--hover-bg)}

.app-add-form{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.app-add-input{width:100%;height:34px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);padding:0 10px;font-size:12px;font-family:inherit;outline:none;transition:border-color .2s}
.app-add-input:focus{border-color:var(--c)}
.app-add-input::placeholder{color:var(--text-light);opacity:.5;font-weight:300}
.app-add-btn{width:100%;height:36px;padding:0 14px;border-radius:6px;border:none;background:var(--c);color:#fff;font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;transition:all .15s;flex-shrink:0}
.app-add-btn:hover{background:var(--c-hover)}
.app-item{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:1px solid var(--border-light);margin-bottom:6px;transition:all .15s;background:var(--bg)}
.app-item:hover{border-color:var(--border)}
.app-item-icon{width:28px;height:28px;border-radius:6px;background:var(--c-soft);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:12px;color:var(--c);font-weight:700}
.app-item-info{flex:1;min-width:0}
.app-item-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.app-item-url{font-size:10px;color:var(--text-light);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.6}
.app-item-del{width:24px;height:24px;border-radius:5px;border:none;background:0 0;color:var(--text-light);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0;transition:all .12s;flex-shrink:0}
.app-item:hover .app-item-del{opacity:.5}
.app-item-del:hover{opacity:1!important;background:rgba(255,80,80,.15);color:#f87171}
.app-empty{text-align:center;color:var(--text-light);padding:30px 10px;font-size:12px;opacity:.5;line-height:1.6}

/* ====== 検索対策通知カード ====== */
.search-counter-card{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);width:380px;max-width:calc(100vw - 40px);z-index:10001;pointer-events:none;transition:transform .5s cubic-bezier(.16,1,.3,1);opacity:0}
.search-counter-card.show{transform:translateX(-50%) translateY(0);opacity:1;pointer-events:auto}
.search-counter-card.hiding{transform:translateX(-50%) translateY(120%);opacity:0;transition:transform .3s ease-in,opacity .3s ease-in}
.sc-card-aurora{position:relative;border-radius:18px;padding:2.5px;flex-shrink:0}
.sc-card-aurora::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:2.5px;background:conic-gradient(from var(--sc-aurora-angle,0deg),#84cc16,#10b981,#2563eb,#84cc16,#10b981);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;animation:scAuroraSpin 3.5s linear infinite;filter:blur(1.5px)}
@property --sc-aurora-angle{syntax:'<angle>';initial-value: 0deg;inherits:false}
@keyframes scAuroraSpin{to{--sc-aurora-angle:360deg}}
.sc-card-inner{background:rgba(28,28,30,.94);backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);border-radius:15px;padding:18px 20px;position:relative;z-index:1}
.sc-card-content{display:flex;gap:14px;align-items:flex-start}
.sc-card-img{width:56px;height:56px;border-radius:12px;object-fit:cover;flex-shrink:0;background:var(--border-light)}
.sc-card-img-placeholder{width:56px;height:56px;border-radius:12px;flex-shrink:0;background:linear-gradient(135deg,rgba(132,204,22,.15),rgba(37,99,235,.15));display:flex;align-items:center;justify-content:center}
.sc-card-img-placeholder i{font-size:20px;color:var(--c);opacity:.6}
.sc-card-body{flex:1;min-width:0}
.sc-card-label{font-size:9px;font-weight:700;color:var(--c);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:4px;opacity:.7}
.sc-card-text{font-size:13px;font-weight:500;color:var(--text);line-height:1.65;word-break:break-word}
.sc-card-close{position:absolute;top:12px;right:12px;width:24px;height:24px;border-radius:6px;border:none;background:rgba(255,255,255,.06);color:var(--text-light);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:0;pointer-events:none}
.sc-card-close.visible{opacity:1;pointer-events:auto}
.sc-card-close:hover{background:rgba(255,255,255,.12);color:var(--text)}
.sc-card-close.visible:hover{background:rgba(255,80,80,.15);color:#f87171}

#notification-area{position:fixed;bottom:16px;right:16px;width:300px;z-index:10000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
#notification-area-left{position:fixed;bottom:16px;left:calc(var(--vtab-w) + 16px);width:300px;z-index:10000;display:flex;flex-direction:column;gap:8px;transition:left .25s cubic-bezier(.4,0,.2,1);pointer-events:none}
.toast{pointer-events:auto;background:var(--toast-bg);backdrop-filter:blur(12px);border-radius:8px;box-shadow:0 4px 16px rgba(0,0,0,.3);padding:10px 14px;position:relative;animation:slideIn .25s ease-out forwards;border-left:3px solid var(--toast-border);cursor:default}
.toast.closer{animation:slideOut .2s ease-in forwards}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
.toast-header{font-size:10px;color:var(--text-light);margin-bottom:2px;font-weight:600}
.toast-close{background:0 0;border:none;cursor:pointer;font-size:14px;color:var(--text-light);position:absolute;top:8px;right:8px;z-index:2;opacity:.6}
.toast-close:hover{color:var(--text)}
.toast-body{font-size:13px;font-weight:500;margin-right:14px;line-height:1.3;color:var(--text)}

.copilot-top-notif{position:fixed;top:58px;left:50%;transform:translateX(-50%) translateY(-30px);z-index:20000;opacity:0;pointer-events:none;transition:opacity .4s cubic-bezier(.16,1,.3,1),transform .4s cubic-bezier(.16,1,.3,1);cursor:pointer}
.copilot-top-notif.visible{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.copilot-top-notif.hiding{opacity:0;transform:translateX(-50%) translateY(-20px);transition:opacity .25s ease-in,transform .25s ease-in}
.copilot-top-inner{background:var(--copilot-bg);backdrop-filter:blur(16px) saturate(1.2);-webkit-backdrop-filter:blur(16px) saturate(1.2);border:1px solid var(--border);border-radius:12px;padding:10px 18px;display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,.25)}
.copilot-top-label{font-size:10px;font-weight:700;color:var(--c);letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.copilot-top-msg{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap}

.banner-notif{position:fixed;top:0;left:0;right:0;z-index:99999;transform:translateY(-100%);transition:transform .45s cubic-bezier(.16,1,.3,1);pointer-events:none}
.banner-notif.show{transform:translateY(0);pointer-events:auto}
.banner-notif-inner{display:flex;align-items:stretch;background:rgba(20,20,22,.92);backdrop-filter:blur(20px) saturate(1.3);-webkit-backdrop-filter:blur(20px) saturate(1.3);border-bottom:1px solid var(--border);box-shadow:0 4px 24px rgba(0,0,0,.4)}
.banner-notif-img{width:120px;min-height:80px;flex-shrink:0;object-fit:cover;background:var(--border-light)}
.banner-notif-body{flex:1;padding:14px 16px;display:flex;flex-direction:column;justify-content:center;min-width:0;cursor:pointer}
.banner-notif-desc{font-size:13px;font-weight:500;color:var(--text);line-height:1.5;margin-bottom:4px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.banner-notif-link{font-size:11px;color:var(--c);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:.8}
.banner-notif-close{width:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:0 0;border:none;color:var(--text-light);cursor:pointer;font-size:16px;transition:all .12s}
.banner-notif-close:hover{color:var(--text);background:var(--hover-bg)}
@media(max-width:640px){
.banner-notif-img{width:80px;min-height:60px}
.banner-notif-desc{font-size:12px;-webkit-line-clamp:1}
.search-counter-card{width:calc(100vw - 32px);bottom:12px}
}

.summary-card-overlay{position:absolute;top:10px;left:50%;transform:translateX(-50%);width:90%;max-width:600px;z-index:80;opacity:0;visibility:hidden;transition:opacity .4s cubic-bezier(.16,1,.3,1),visibility .4s;pointer-events:none}
.summary-card-overlay.visible{opacity:1;visibility:visible;pointer-events:auto}
.summary-card-aurora{position:relative;width:100%;border-radius:18px;padding:3px;flex-shrink:0;pointer-events:auto;box-shadow:var(--shadow-lg)}
.summary-card-aurora::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:3px;background:conic-gradient(from var(--summary-aurora-angle,0deg),#84cc16,#10b981,#2563eb,#84cc16,#10b981);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;animation:summaryAuroraSpin 4s linear infinite;filter:blur(1.5px)}
@property --summary-aurora-angle{syntax:'<angle>';initial-value: 0deg;inherits:false}
@keyframes summaryAuroraSpin{to{--summary-aurora-angle:360deg}}
.summary-card-inner{background:rgba(28,28,30,.92);backdrop-filter:blur(28px) saturate(1.3);-webkit-backdrop-filter:blur(28px) saturate(1.3);border-radius:15px;padding:20px 24px 16px;position:relative;z-index:1;max-height:60vh;overflow-y:auto}
.summary-card-close{position:absolute;top:10px;right:12px;width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,.08);color:var(--text-light);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;z-index:5}
.summary-card-close:hover{background:rgba(255,255,255,.15);color:var(--text)}
.summary-card-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:12px;line-height:1.4;min-height:24px}
.summary-first-line{font-size:15px;font-weight:600;color:var(--text);line-height:1.7;margin-bottom:8px;min-height:24px}
.summary-rest-text{font-size:13px;font-weight:400;color:var(--text-light);line-height:1.8;margin-bottom:16px;min-height:20px}
.summary-images-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:6px;scroll-snap-type:x mandatory;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.15) transparent}
.summary-images-scroll::-webkit-scrollbar{height:4px}
.summary-images-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.summary-img{flex-shrink:0;width:160px;height:100px;border-radius:10px;object-fit:cover;scroll-snap-align:start;opacity:0;transform:translateY(10px) scale(.96);transition:opacity .5s ease,transform .5s ease;cursor:pointer}
.summary-img.shown{opacity:1;transform:translateY(0) scale(1)}
.summary-img:hover{transform:translateY(-2px) scale(1.02)!important;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.summary-no-img{font-size:12px;color:var(--text-light);opacity:.5;padding:8px 0}

/* ====== サイドバーIframe改善 ====== */
.epm-sidebar-iframe-wrap{flex:1;overflow:hidden;position:relative;display:none;background:#000}
.epm-sidebar-iframe-wrap.active{display:flex;flex-direction:column}
.epm-sidebar-iframe-scaler{flex:1;overflow:hidden;position:relative}
.epm-sidebar-iframe-scaler.mobile-view{display:flex;align-items:flex-start;justify-content:center;background:#1a1a1c;overflow-y:auto}
.epm-sidebar-iframe-scaler.mobile-view iframe{width:100%;height:100%;border:none;display:block;transform-origin:top left;background:#fff}
.epm-sidebar-iframe-scaler:not(.mobile-view) iframe{width:100%;flex:1;border:none;display:block;background:#fff}
.epm-sidebar-iframe-close{position:absolute;top:8px;right:8px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.7);backdrop-filter:blur(6px);border:none;color:#fff;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;z-index:10;transition:all .15s}
.epm-sidebar-iframe-close:hover{background:rgba(0,0,0,.9);transform:scale(1.1)}
.epm-sidebar-iframe-zoom-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.45);background:rgba(0,0,0,.5);padding:3px 10px;border-radius:999px;pointer-events:none;z-index:10;white-space:nowrap;opacity:0;transition:opacity .3s}
.epm-sidebar-iframe-zoom-hint.visible{opacity:1}

.epm-sidebar-url-bar{display:flex;align-items:center;padding:8px 12px;gap:6px;border-bottom:1px solid var(--border-light);background:var(--bg);flex-shrink:0;position:relative}
.epm-sidebar-url-bar i.epm-url-icon{font-size:10px;color:var(--text-light);flex-shrink:0;pointer-events:none;transition:color .2s}
.epm-sidebar-url-input{flex:1;height:26px;border-radius:999px;background:rgba(255,255,255,.06);border:1px solid var(--border);padding:0 10px;font-size:11px;font-family:inherit;outline:none;color:var(--text);transition:all .2s}
.epm-sidebar-url-input::placeholder{color:var(--text-light);font-weight:300;opacity:.5;font-size:10px}
.epm-sidebar-url-input:focus{background:rgba(255,255,255,.1);border-color:var(--c);box-shadow:0 0 0 2px var(--c-glow)}
.epm-sidebar-url-input.disabled{opacity:.4;cursor:not-allowed;pointer-events:none}
.epm-sidebar-url-input.disabled:focus{border-color:var(--border);box-shadow:none;background:rgba(255,255,255,.06)}
.epm-sidebar-url-go{width:24px;height:24px;border-radius:50%;border:none;background:var(--c);color:#fff;cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.epm-sidebar-url-go:hover{background:var(--c-hover);transform:scale(1.05)}
.epm-sidebar-url-go.disabled{background:var(--border);color:var(--text-light);cursor:not-allowed;transform:none}
.epm-sidebar-url-warning{position:absolute;top:100%;left:12px;right:12px;font-size:10px;color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2);border-radius:6px;padding:5px 8px;opacity:0;transform:translateY(-4px);transition:all .2s;pointer-events:none;z-index:5;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.epm-sidebar-url-warning.visible{opacity:1;transform:translateY(2px)}
.epm-sidebar-url-clear{width:18px;height:18px;border-radius:50%;border:none;background:var(--border);color:var(--text-light);cursor:pointer;font-size:8px;display:none;align-items:center;justify-content:center;flex-shrink:0;transition:all .1s}
.epm-sidebar-url-clear.visible{display:flex}
.epm-sidebar-url-clear:hover{background:var(--border-light);color:var(--text)}
.epm-sidebar-url-back{width:24px;height:24px;border-radius:50%;border:none;background:0 0;color:var(--text-light);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.epm-sidebar-url-back:hover{background:var(--hover-bg);color:var(--text)}

.epm-sidebar{position:fixed;top:0;right:-420px;width:400px;height:100%;z-index:10001;transition:right .4s cubic-bezier(.4,0,.2,1)}
.epm-sidebar.open{right:0}
.epm-border-wrapper{position:relative;width:100%;height:100%;border-radius:20px 0 0 20px;padding:3px}
.epm-border-wrapper::before{content:'';position:absolute;inset:0;border-radius:inherit;padding:3px;background:conic-gradient(from var(--epm-grad-angle,0deg),var(--grad-colors));-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;z-index:1;animation:epmGradSpin 3s linear infinite}
.epm-inner{width:100%;height:100%;background:var(--surface);border-radius:inherit;display:flex;flex-direction:column;position:relative;z-index:2;overflow:hidden}
.epm-header{padding:14px 18px;border-bottom:1px solid var(--border-light);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:15px;color:var(--c);flex-shrink:0;background:var(--bg)}
.epm-close{background:0 0;border:none;font-size:20px;cursor:pointer;color:var(--text-light);width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.epm-close:hover{background:var(--border-light);color:var(--text)}
.epm-chat{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:16px}
.epm-chat::-webkit-scrollbar{width:4px}
.epm-chat::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.epm-chat.sidebar-hidden{display:none!important}
.epm-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;color:var(--text-light)}
.epm-welcome-title{font-size:20px;font-weight:800;color:var(--text);margin-bottom:8px}
.epm-welcome-sub{font-size:13px;font-weight:300;color:var(--text-light);margin-bottom:4px}
.epm-suggestions{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin-top:18px;max-width:340px}
.epm-suggest-chip{padding:6px 14px;background:var(--bg);border:1px solid var(--border);border-radius:999px;font-size:12px;color:var(--text-light);cursor:pointer;transition:all .15s;user-select:none}
.epm-suggest-chip:hover{background:var(--c-soft);color:var(--c);border-color:var(--c);transform:translateY(-1px)}
.epm-msg{display:flex;animation:epmMsgIn .4s cubic-bezier(.16,1,.3,1) forwards}
@keyframes epmMsgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.epm-msg.user{justify-content:flex-end}
.epm-msg.bot{justify-content:flex-start}
.epm-bubble-user{background:var(--c);color:#fff;padding:8px 16px;border-radius:16px 16px 2px 16px;font-size:13px;font-weight:500;max-width:80%;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.epm-card{background:var(--bg);border-radius:12px;padding:16px;max-width:100%;box-shadow:0 1px 4px rgba(0,0,0,.2);border:1px solid var(--border-light)}
.epm-card-title{font-size:16px;font-weight:700;margin-bottom:10px;color:var(--text);line-height:1.3}
.epm-card-text{font-size:13px;color:var(--text-light);line-height:1.8;margin-bottom:6px;display:flex;flex-wrap:wrap}
.epm-sentence{display:inline}
.epm-waiting-dots{display:inline-block;color:var(--c);font-size:14px;font-weight:700;letter-spacing:-2px}
.epm-no-result{font-size:13px;color:var(--text-light);padding:10px;background:var(--bg);border-radius:8px}
.epm-thinking{font-size:13px;color:var(--text-light);display:flex;align-items:center;gap:2px}
.dots-anim span{display:inline-block;animation:bounceUp 1.4s infinite ease-in-out both;color:var(--c)}
.dots-anim span:nth-child(1){animation-delay:-.32s}
.dots-anim span:nth-child(2){animation-delay:-.16s}
@keyframes bounceUp{0%,80%,100%{transform:translateY(0);opacity:.3}40%{transform:translateY(-4px);opacity:1}}
.epm-section-label{font-size:10px;color:var(--text-light);font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:14px;margin-bottom:6px;opacity:.6}
.epm-gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.epm-gallery-img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:8px;cursor:pointer;transition:all .2s;background:var(--border-light);opacity:0;animation:galleryFadeIn .3s ease forwards}
.epm-gallery-img:hover{transform:scale(1.04);box-shadow:0 3px 12px rgba(0,0,0,.4);z-index:2;position:relative}
@keyframes galleryFadeIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.epm-related-links{margin-top:14px;padding-top:12px;border-top:1px solid var(--border-light)}

.epm-related-link:hover{background:var(--c);color:#fff;transform:translateY(-1px)}
.epm-context-link{font-size:11px;color:var(--text-light);background:var(--bg);border:1px solid var(--border-light);border-radius:6px;padding:5px 10px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .15s;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.epm-context-link:hover{background:var(--c-soft);color:var(--c);border-color:var(--c)}
.epm-context-active{border-color:var(--c)!important;background:var(--c-soft)!important;color:var(--c)!important}

#epmSendBtn{width:32px;height:32px;border-radius:50%;background:var(--c);color:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;transition:all .15s;flex-shrink:0}
#epmSendBtn:hover{background:var(--c-hover)}

// ====== 検索対策通知カードロジック ======
var searchCounterRules=[],scCardCloseTimer=null,scCardShownWords={},SC_CLOSE_DELAY=10000;
async function loadSearchCounterRules(){searchCounterRules=[];try{var r=await gasGetSearchCountermeasures();if(Array.isArray(r))searchCounterRules=r}catch(e){}}
function checkSearchCounter(keyword){
  if(!keyword||keyword.trim().length===0)return;
  keyword=keyword.trim();
  for(var i=0;i<searchCounterRules.length;i++){
    var rule=searchCounterRules[i];
    if(!rule.word)continue;
    var word=rule.word.trim();
    var kwLower=keyword.toLowerCase(),wordLower=word.toLowerCase();
    if(kwLower.indexOf(wordLower)!==-1||wordLower.indexOf(kwLower)!==-1){
      if(scCardShownWords[word])continue;
      showSearchCounterCard(rule);
      scCardShownWords[word]=true;
      break;
    }
  }
}
function showSearchCounterCard(rule){
  var card=document.getElementById("searchCounterCard");
  var textEl=document.getElementById("scCardText");
  var imgArea=document.getElementById("scCardImgArea");
  var closeBtn=document.getElementById("scCardClose");
  if(scCardCloseTimer){clearTimeout(scCardCloseTimer);scCardCloseTimer=null}
  closeBtn.classList.remove("visible");
  textEl.textContent=rule.message||"";
  if(rule.imageUrl){
    imgArea.innerHTML='<img class="sc-card-img" src="'+escapeHtml(rule.imageUrl)+'" alt="" onerror="this.parentElement.innerHTML=\'<div class=sc-card-img-placeholder><i class=fas fa-info-circle></i></div>\'">';
  }else{
    imgArea.innerHTML='<div class="sc-card-img-placeholder"><i class="fas fa-info-circle"></i></div>';
  }
  card.classList.remove("hiding");
  card.classList.add("show");
  scCardCloseTimer=setTimeout(function(){
    closeBtn.classList.add("visible");
  },SC_CLOSE_DELAY);
}

var epmIframeZoomed=false,epmIframeMobileScale=1,epmIframeLastTapTime=0;
function setupMobileIframeView(){
  var scaler=document.getElementById("epmSidebarIframeScaler");
  var iframe=document.getElementById("epmSidebarIframe");
  var hint=document.getElementById("epmIframeZoomHint");
  epmIframeZoomed=false;
  function calcScale(){
    var wrapW=document.getElementById("epmSidebarIframeWrap").clientWidth;
    var mobileW=375;
    var s=wrapW/mobileW;
    epmIframeMobileScale=Math.min(s,1);
    return epmIframeMobileScale;
  }
  function applyScale(){
    var s=epmIframeZoomed?1:calcScale();
    var wrapW=document.getElementById("epmSidebarIframeWrap").clientWidth;
    var mobileW=375;
    var realW=epmIframeZoomed?wrapW:mobileW;
    var realH=epmIframeZoomed?wrapW*1.6:mobileW*1.6;
    iframe.style.width=realW+"px";
    iframe.style.height=realH+"px";
    iframe.style.transform=epmIframeZoomed?"none":"scale("+s+")";
    iframe.style.transformOrigin="top left";
    iframe.style.borderRadius=epmIframeZoomed?"0":"16px";
    iframe.style.boxShadow=epmIframeZoomed?"none":"0 4px 24px rgba(0,0,0,.5)";
    scaler.style.height=epmIframeZoomed?(wrapW*1.6)+"px":(mobileW*epmIframeMobileScale*1.6)+"px";
    scaler.style.overflowY=epmIframeZoomed?"auto":"hidden";
    scaler.style.alignItems=epmIframeZoomed?"stretch":"flex-start";
    scaler.style.justifyContent=epmIframeZoomed?"stretch":"center";
    hint.classList.toggle("visible",!epmIframeZoomed);
  }
  scaler.addEventListener("dblclick",function(e){
    if(e.target.closest(".epm-sidebar-iframe-close"))return;
    epmIframeZoomed=!epmIframeZoomed;
    applyScale();
  });
  scaler.addEventListener("touchend",function(e){
    var now=Date.now();
    if(now-epmIframeLastTapTime<350){
      epmIframeZoomed=!epmIframeZoomed;
      applyScale();
      e.preventDefault();
    }
    epmIframeLastTapTime=now;
  },{passive:false});
  var resizeObs=null;
  if(typeof ResizeObserver!=="undefined"){
    resizeObs=new ResizeObserver(function(){if(!epmIframeZoomed)applyScale()});
    resizeObs.observe(document.getElementById("epmSidebarIframeWrap"));
  }
  window._epmIframeApplyScale=applyScale;
}

function renderHistory(){var l=document.getElementById("historyList");if(!histList.length){l.innerHTML='<div style="text-align:center;color:var(--text-light);padding:20px;font-size:12px">履歴はありません</div>';return}var h="";for(var i=0;i<histList.length;i++){var hi=histList[i];h+='<div class="list-item" onclick="createTab(\''+hi.url.replace(/'/g,"\\'")+'\');closeAllOverlays()"><div class="list-title">'+escapeHtml(hi.title)+'</div><div class="list-url">'+escapeHtml(hi.url)+'</div><div class="list-time">'+hi.time+'</div><button class="list-delete" onclick="event.stopPropagation();deleteHistory(event,'+i+')">&times;</button></div>'}l.innerHTML=h}
function deleteHistory(e,i){e.stopPropagation();histList.splice(i,1);localStorage.setItem("olivine_history_v1",JSON.stringify(histList));renderHistory()}
function clearExtHistory(){if(confirm("履歴を全て削除しますか？")){histList=[];localStorage.setItem("olivine_history_v1","[]");renderHistory()}}
function addBookmark(){var tab=tabs.find(function(t){return t.id===activeId});if(!tab||!tab.url){showCustomToast("Bookmark","ブックマークできるページがありません",null,"left");return}var url=extractCleanUrl(tab.url),title=tab.title;if(bms.some(function(b){return b.url===url})){showCustomToast("Bookmark","すでに登録されています",null,"left");return}bms.push({title:title,url:url,time:new Date().toLocaleString()});localStorage.setItem("olivine_bms_v1",JSON.stringify(bms));renderBookmarks();updateBmStar();showCustomToast("Bookmark","ブックマークしました",null,"left")}
function updateBmStar(){var star=document.getElementById("bmStar"),tab=tabs.find(function(t){return t.id===activeId});if(!tab||!tab.url){star.className="far fa-star";star.style.color="";return}var url=extractCleanUrl(tab.url);if(bms.some(function(b){return b.url===url})){star.className="fas fa-star";star.style.color="#d4a017"}else{star.className="far fa-star";star.style.color=""}}

function deleteBookmark(e,i){e.stopPropagation();bms.splice(i,1);localStorage.setItem("olivine_bms_v1",JSON.stringify(bms));renderBookmarks();updateBmStar()}

function switchExtTab(name,btn){if(btn){document.querySelectorAll(".ext-tab-btn").forEach(function(b){b.classList.remove("active")});btn.classList.add("active")}document.querySelectorAll(".ext-content").forEach(function(c){c.classList.remove("active")});var t=document.getElementById("ext-"+name);if(t)t.classList.add("active")}

function showCustomToast(title,message,onClickAction,side){side=side||"right";var areaId=side==="left"?"notification-area-left":"notification-area",area=document.getElementById(areaId);while(area.children.length>=MAX_NOTIFICATIONS)area.removeChild(area.firstElementChild);var toast=document.createElement("div");toast.className="toast";if(onClickAction)toast.onclick=function(){onClickAction();toast.classList.add("closer");setTimeout(function(){toast.remove()},300)};toast.innerHTML='<button class="toast-close" onclick="event.stopPropagation();removeToast(this)">&times;</button><div class="toast-header">'+title+'</div><div class="toast-body">'+message+'</div>';area.appendChild(toast);setTimeout(function(){if(toast.parentElement){toast.classList.add("closer");setTimeout(function(){if(toast.parentElement)toast.remove()},300)}},8000)}
function removeToast(b){var t=b.parentElement;t.classList.add("closer");setTimeout(function(){t.remove()},300)}

var slideThemes={水色:{bg:"#e8f4f8",text:"#1a3a4a",accent:"#2196F3",overlay:"linear-gradient(135deg, rgba(33,150,243,0.6), rgba(0,0,0,0.4))"},ピンク:{bg:"#fdf2f4",text:"#4a1a2e",accent:"#e91e63",overlay:"linear-gradient(135deg, rgba(233,30,99,0.5), rgba(0,0,0,0.4))"},白:{bg:"#ffffff",text:"#1a1a1a",accent:"#333333",overlay:"linear-gradient(135deg, rgba(255,255,255,0.4), rgba(0,0,0,0.6))"},ベージュ:{bg:"#f5f0e8",text:"#3e352a",accent:"#8d6e4c",overlay:"linear-gradient(135deg, rgba(141,110,76,0.5), rgba(0,0,0,0.4))"}};
function showSlideThemeSelector(){if(!window._tmpSlideData||!window._tmpSlideData.title)return;currentSlideData=window._tmpSlideData;selectedTheme=null;var chat=document.getElementById("epmChat"),td=document.createElement("div");td.className="epm-msg bot";td.id="theme-selector";var themes=["水色","ピンク","白","ベージュ"],tc={水色:"#e8f4f8",ピンク:"#fdf2f4",白:"#ffffff",ベージュ:"#f5f0e8"},txtC={水色:"#333",ピンク:"#333",白:"#333",ベージュ:"#333"},h='<div class="epm-card" style="padding:16px"><div style="font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)">スライドテーマを選択</div><div class="theme-selector-grid" id="theme-options">';for(var i=0;i<themes.length;i++){h+='<div onclick="selectTheme(\''+themes[i]+'\')" class="theme-option" id="opt-'+themes[i]+'" style="background:'+tc[themes[i]]+';color:'+txtC[themes[i]]+'">'+themes[i]+"</div>"}h+='</div><button onclick="startSlideGen()" id="gen-slide-btn" class="gen-slide-btn" disabled>生成する</button></div>';td.innerHTML=h;chat.appendChild(td);chat.scrollTop=chat.scrollHeight}
function selectTheme(name){selectedTheme=name;document.querySelectorAll(".theme-option").forEach(function(el){el.style.borderColor="transparent"});document.getElementById("opt-"+name).style.borderColor="#3b82f6";var btn=document.getElementById("gen-slide-btn");btn.disabled=false;btn.classList.add("active")}
function startSlideGen(){if(!selectedTheme||!currentSlideData.title)return;var btn=document.getElementById("gen-slide-btn");btn.innerText="生成中...";btn.disabled=true;btn.classList.remove("active");setTimeout(function(){var html=generateSlides(currentSlideData.title,currentSlideData.text,currentSlideData.images,selectedTheme);openGeneratedTab(currentSlideData.title+" - Slides",html);btn.innerText="生成完了（新規タブで開きました）";btn.classList.add("done");selectedTheme=null;currentSlideData={}},500)}
function generateSlides(title,fullText,images,themeName){var theme=slideThemes[themeName];var cleanedText=cleanWikiText(fullText);var sentences=cleanedText.split("\u3000").join("").split("\n").join("").split("\u3002").filter(function(s){return s.trim().length>0}).map(function(s){return s.trim()+"\u3002"});var slides="";var coverImg=(images.length>0)?images[0]:"";var coverStyle=coverImg?"background-image:url('"+coverImg+"');background-size:cover;background-position:center;":"background:"+theme.accent+";";slides+='<div class="slide active" style="'+coverStyle+'justify-content:center;align-items:flex-start;padding-left:60px"><div style="position:absolute;inset:0;background:'+theme.overlay+'"></div><h1 style="color:#fff;font-size:64px;font-weight:800;position:relative;z-index:1;margin:0;text-shadow:0 2px 10px rgba(0,0,0,0.5)">'+escapeHtml(title)+'</h1></div>';for(var idx=0;idx<sentences.length;idx++){var sent=escapeHtml(sentences[idx]);var img=(idx+1<images.length)?images[idx+1]:"";if(img){slides+='<div class="slide" style="background:'+theme.bg+';flex-direction:row"><div style="flex:1;padding:60px;display:flex;flex-direction:column;justify-content:center"><p style="color:'+theme.text+';font-size:26px;line-height:1.8;margin:0">'+sent+'</p></div><div style="flex:1;overflow:hidden"><img src="'+img+'" style="width:100%;height:100%;object-fit:cover"></div></div>'}else{slides+='<div class="slide" style="background:'+theme.bg+';justify-content:center;align-items:center"><p style="color:'+theme.text+';font-size:32px;line-height:1.8;margin:0;max-width:80%;text-align:center">'+sent+'</p></div>'}}
var gh="";if(images.length>0){gh='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:800px;width:100%;margin-top:40px">';for(var k=0;k<images.length;k++){gh+='<img src="'+images[k]+'" style="width:100%;height:150px;object-fit:cover;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,0.1))">'}gh+="</div>"}
slides+='<div class="slide" style="background:'+theme.bg+';flex-direction:column;justify-content:center;align-items:center"><h2 style="color:'+theme.accent+';font-size:48px;margin:0;font-family:Outfit,sans-serif;font-weight:800">Clarvet Slides</h2>'+gh+'</div>';
var total=sentences.length+2;
return '<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0}body{margin:0;overflow:hidden;font-family:Outfit,sans-serif;background:#f0f0f0}.slide{width:100vw;height:100vh;position:absolute;top:0;left:0;display:none;flex-direction:column}.slide.active{display:flex}.controls{position:fixed;bottom:20px;right:20px;display:flex;gap:10px;z-index:100}.controls button{background:rgba(0,0,0,0.5);color:#fff;border:none;padding:10px 15px;border-radius:50%;cursor:pointer;font-size:16px;backdrop-filter:blur(4px);transition:background 0.2s}.controls button:hover{background:rgba(0,0,0,0.8)}.page-num{position:fixed;bottom:20px;left:20px;color:rgba(0,0,0,0.5);font-size:14px;z-index:100;font-family:Outfit,sans-serif}</style><link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;800&display=swap" rel="stylesheet"></head><body>'+slides+'<div class="page-num" id="pageNum">1 / '+total+'</div><div class="controls"><button id="prevBtn">\u2190</button><button id="nextBtn">\u2192</button></div><script>'+SLIDE_NAV_JS+'<\/script></body></html>'}

function openGeneratedTab(title,htmlContent){var id="tab-"+Date.now()+Math.floor(Math.random()*1000),nt={id:id,url:"",title:title,isTextMode:false,history:[],historyIndex:-1};
tabs.push(nt);
var iframe=document.createElement("iframe");
iframe.id=id;
iframe.sandbox="allow-scripts allow-same-origin";
mainArea.appendChild(iframe);
var tabEl=document.createElement("div");
tabEl.className="vtab-item";
tabEl.id="ui-"+id;
tabEl.draggable=true;
tabEl.title=nt.title;
tabEl.innerHTML='<div class="vtab-favicon"><i class="fas fa-tv" style="font-size:11px;color:#3b82f6"></i></div><span class="vtab-title-text">'+nt.title+'</span><button class="vtab-close-btn">&times;</button>';
tabEl.querySelector(".vtab-close-btn").addEventListener("click",function(e){
e.stopPropagation();
var idx=-1;
for(var ii=0;ii<tabs.length;ii++){
if(tabs[ii].id===id){idx=ii;break}
}
if(idx===-1)return;
var el=document.getElementById(id),ui=document.getElementById("ui-"+id);
if(el)el.remove();
if(ui)ui.remove();
tabs.splice(idx,1);
if(activeId===id){
if(tabs.length>0)switchTab(tabs[Math.min(idx,tabs.length-1)].Yid);
else{
activeId=null;
homeScreen.classList.remove("hidden");
urlInput.value="";
updateUrlClearBtn();
triggerHomeAnimation();
setTimeout(function(){showHomeSuggest();loadSheetApps()},600);
}
}
});
tabEl.addEventListener("click",function(e){
if(!e.target.closest(".vtab-close-btn"))switchTab(id);
});
tabEl.addEventListener("dblclick",function(e){
if(e.target.closest(".vtab-close-btn"))return;
startTabRename(id,e);
});
addDragEvents(tabEl);
tabsContainer.appendChild(tabEl);
switchTab(id);
homeScreen.classList.add("hidden");
closeSummaryCard();
iframe.srcdoc=htmlContent;
}
